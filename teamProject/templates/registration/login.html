{% extends 'ledger/base.html' %}
{% load static %}

{% block title_block %}
	Login
{% endblock %}

{% block body_block %}
<link rel="stylesheet" type="text/css" href="{% static 'css/registration.css' %}">

<div class="registration-container">
    <div class="registration-card">
        <h1>Login</h1>

        <form method="post" action=".">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    <div class="input-wrapper">
                        {{ field }}
                    </div>
                    {% for error in field.errors %}
                        <span class="error-text" style="color: #b02a37; font-size: 0.8rem; display: block; margin-top: 5px;">
                            {{ error }}
                        </span>
                    {% endfor %}
                </div>
            {% endfor %}

            <input type="hidden" name="next" value="{{ next }}" />
            
            <button type="submit" class="btn-register">Log In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Not registered? 
            <a href="{% url 'registration_register' %}" style="color: #425325; font-weight: bold; text-decoration: none;">
                Register here!
            </a>
        </p>
    </div>
</div>
{% endblock %}
