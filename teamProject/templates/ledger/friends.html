{% extends 'ledger/base.html' %}

{% block body_block %}
<div style="padding: 40px; max-width: 1000px; margin: 0 auto;">
    <h1 style="font-size: 48px; margin-bottom: 10px;">My Friends</h1>
    <p style="font-size: 20px; color: #555; margin-bottom: 40px;">
        View your connected friends and keep track of their progress.
    </p>

    {% if friends_list %}
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px;">
        {% for friend in friends_list %}
        <div style="border: 1px solid #ddd; border-radius: 16px; padding: 25px; background-color: #fafafa;">
            <h2 style="margin-bottom: 16px;">{{ friend.username }}</h2>
            <a href="{% url 'ledger:nudge' %}"
               style="display: inline-block; padding: 10px 18px; background-color: #222; color: white; text-decoration: none; border-radius: 8px;">
                Send Nudge
            </a>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; background-color: #fafafa; color: #555;">
        You have no friends yet.
    </div>
    {% endif %}
</div>
{% endblock %}
