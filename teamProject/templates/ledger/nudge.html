{% extends 'ledger/base.html' %}

{% block body_block %}
<div style="padding: 40px; max-width: 900px; margin: 0 auto;">
    <h1 style="font-size: 48px; margin-bottom: 10px;">Send a Nudge</h1>
    <p style="font-size: 20px; color: #555; margin-bottom: 40px;">
        Encourage a friend to stay consistent with their habits.
    </p>

    <div style="border: 1px solid #ddd; border-radius: 16px; padding: 30px; background-color: #fafafa;">
        <form method="post" action="#">
            <div style="margin-bottom: 25px;">
                <label for="friend" style="display: block; font-size: 18px; margin-bottom: 10px;">Choose a friend</label>
                <select id="friend" name="friend" style="width: 100%; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;">
                    {% for friend in friends_list %}
                    <option value="{{ friend.name }}">{{ friend.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="message" style="display: block; font-size: 18px; margin-bottom: 10px;">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    placeholder="Write an encouraging message..."
                    style="width: 100%; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: vertical;"
                ></textarea>
            </div>

            <button
                type="submit"
                style="padding: 12px 20px; background-color: #222; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;"
            >
                Send Nudge
            </button>
        </form>
    </div>
</div>
{% endblock %}
