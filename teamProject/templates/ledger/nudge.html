{% extends 'ledger/base.html' %}

{% block body_block %}
<div style="padding: 40px; max-width: 900px; margin: 0 auto;">
    <h1 style="font-size: 48px; margin-bottom: 10px;">Send a Nudge</h1>
    <p style="font-size: 20px; color: #555; margin-bottom: 40px;">
        Encourage a friend to stay consistent with their habits.
    </p>

    {% if success_message %}
    <div id="success-message" style="margin-bottom: 25px; padding: 16px 20px; background-color: #f2f2f2; border: 1px solid #ddd; border-radius: 12px; color: #222; opacity: 1; transition: opacity 0.8s ease;">
        {{ success_message }}
    </div>
    {% endif %}

    {% if error_message %}
    <div id="error-message" style="margin-bottom: 25px; padding: 16px 20px; background-color: #f8f8f8; border: 1px solid #d9d9d9; border-radius: 12px; color: #222; opacity: 1; transition: opacity 0.8s ease;">
        {{ error_message }}
    </div>
    {% endif %}

    <div style="border: 1px solid #ddd; border-radius: 16px; padding: 30px; background-color: #fafafa;">
        <form method="get" action="{% url 'ledger:nudge' %}">
            <div style="margin-bottom: 25px;">
                <label for="sent_to" style="display: block; font-size: 18px; margin-bottom: 10px;">Choose a friend</label>
                <select id="sent_to" name="sent_to" style="width: 100%; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;">
                    <option value="" {% if not sent_to %}selected{% endif %}>Select a friend</option>
                    {% for friend in friends_list %}
                    <option value="{{ friend.name }}" {% if friend.name == sent_to %}selected{% endif %}>
                        {{ friend.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="message" style="display: block; font-size: 18px; margin-bottom: 10px;">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    placeholder="Write an encouraging message..."
                    style="width: 100%; padding: 12px 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: vertical;"
                >{{ message_text }}</textarea>
            </div>

            <button
                type="submit"
                style="padding: 12px 20px; background-color: #222; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;"
            >
                Send Nudge
            </button>
        </form>
    </div>
</div>

<script>
    setTimeout(function () {
        const successMessage = document.getElementById('success-message');
        if (successMessage) {
            successMessage.style.opacity = '0';
            setTimeout(function () {
                successMessage.style.display = 'none';
            }, 800);
        }

        const errorMessage = document.getElementById('error-message');
        if (errorMessage) {
            errorMessage.style.opacity = '0';
            setTimeout(function () {
                errorMessage.style.display = 'none';
            }, 800);
        }
    }, 3000);
</script>
{% endblock %}
