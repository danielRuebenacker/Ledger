<!Doctype html>
{% load staticfiles %}

<html>
	<head lang="en">
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
		<link rel="stylesheet" href="navbar.css">
		<title>
			Ledger - 
			{% block title_block %}
				Track Habits
			{% endblock %}
		</title>
	</head>

	<body>

	<nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">Ledger</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link nav-box" href="{% url 'my_habits' %}">MyHabits</a></li>
                    <li class="nav-item"><a class="nav-link nav-box" href="{% url 'leaderboards' %}">Leaderboards</a></li>
                    <li class="nav-item"><a class="nav-link nav-box" href="{% url 'social' %}">Social</a></li>
                </ul>
				<ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link nav-box" href="{% url 'profile' %}">Profile</a></li>
                        <li class="nav-item"><a class="nav-link nav-box" href="{% url 'auth_logout' %}">Logout</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link nav-box" href="{% url 'auth_login' %}">Log In</a></li>
                        <li class="nav-item"><a class="nav-link nav-box" href="{% url 'registration_register' %}">Sign Up</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
		<div>
			{% block body_block %}
			{% endblock %}
		</div>
	</body>
</html>
